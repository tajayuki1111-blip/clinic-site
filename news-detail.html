<script>

const SERVICE_ID = "ここにサービスID";
const API_KEY = "ここにAPIキー";

const params = new URLSearchParams(window.location.search);
const currentPage = Number(params.get("page")) || 1;
const limit = 10;
const offset = (currentPage - 1) * limit;

fetch(
`https://${SERVICE_ID}.microcms.io/api/v1/news?limit=${limit}&offset=${offset}`,
{
headers:{
"X-MICROCMS-API-KEY": API_KEY
}
}
)
.then(res => res.json())
.then(data => {

const newsList = document.getElementById("news-list");

if(!data.contents || data.contents.length === 0){

newsList.innerHTML =
`
<div class="news-item">
<div class="news-content">
現在、お知らせはありません。
</div>
</div>
`;

return;
}

const totalPages = Math.ceil(data.totalCount / limit);

const newsHtml =
data.contents.map((news,index) => `

<a href="news-detail.html?id=${news.id}" class="news-list-link">

<div class="news-row ${index % 2 === 0 ? "news-row-blue" : "news-row-white"}">

<div class="news-date">
${new Date(news.publishedAt).toLocaleDateString("ja-JP")}
</div>

<div class="news-title">
${news.title}
</div>

</div>

</a>

`).join("");

let paginationHtml = "";

if(totalPages > 1){

paginationHtml =
`
<div class="news-pagination">
${Array.from({length:totalPages},(_,i) => `
<a href="news.html?page=${i + 1}" class="${currentPage === i + 1 ? "active" : ""}">
${i + 1}
</a>
`).join("")}
</div>
`;

}

newsList.innerHTML = newsHtml + paginationHtml;

})
.catch(error => {

document.getElementById("news-list").innerHTML =
`
<div class="news-item">
<div class="news-content">
現在、お知らせを読み込めません。
</div>
</div>
`;

});

</script>

</body>
