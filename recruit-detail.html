<script>

const SERVICE_ID = "nakai-clinic";

const API_KEY =
"xpk3ljGXAT8e6dyDK7jRVIOZqdrRKG7sjb2H";

const params =
new URLSearchParams(window.location.search);

const recruitId =
params.get("id");

const recruitDetail =
document.getElementById("recruit-detail");

if(!recruitId){

recruitDetail.innerHTML =
`
<div class="news-item">

<div class="news-content">
募集情報が見つかりません。
</div>

<div class="back-news-area">

<a href="index.html"
class="back-news-btn">

</a>

</div>

</div>
`;

}else{

fetch(
`https://${SERVICE_ID}.microcms.io/api/v1/recruit/${recruitId}`,
{
headers:{
"X-MICROCMS-API-KEY": API_KEY
}
}
)
.then(res => {

if(!res.ok){
throw new Error("取得失敗");
}

return res.json();

})
.then(recruit => {

recruitDetail.innerHTML =
`

<div class="news-item">

<h3 class="news-detail-title">
${recruit.title}
</h3>

<div class="news-content">
${recruit.body}
</div>

<div class="back-news-area">

<a href="/#recruit"
class="back-news-btn">

ホームに戻る

</a>

</div>

</div>

`;

})
.catch(error => {

recruitDetail.innerHTML =
`

<div class="news-item">

<div class="news-content">
募集情報を読み込めません。
</div>

<div class="back-news-area">

<a href="/#recruit"
class="back-news-btn">
