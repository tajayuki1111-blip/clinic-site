<script>

const SERVICE_ID = "nakai-clinic";
const API_KEY = "xpk3ljGXAT8e6dyDK7jRVIOZqdrRKG7sjb2H";

fetch(
`https://${SERVICE_ID}.microcms.io/api/v1/news`,
{
headers:{
"X-MICROCMS-API-KEY": API_KEY
}
}
)
.then(res => res.json())
.then(data => {

const newsList = document.getElementById("news-list");

if(!data.contents || data.contents.length === 0){

newsList.innerHTML =
`
<div class="news-item">
<div class="news-content">
現在、お知らせはありません。
</div>
</div>
`;

return;
}

newsList.innerHTML =
data.contents.map(news => `

<a href="news-detail.html?id=${news.id}" class="news-list-link">

<div class="news-item">

<div class="news-date">
${new Date(news.publishedAt).toLocaleDateString("ja-JP")}
</div>

<div class="news-title">
${news.title}
</div>

</div>

</a>

`).join("");

})
.catch(error => {

document.getElementById("news-list").innerHTML =
`
<div class="news-item">
<div class="news-content">
現在、お知らせを読み込めません。
</div>
</div>
`;

});

</script>
